<!DOCTYPE html>
<html lang="en">

<head>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="4d8a508d-3fc9-4a32-bb8b-914d8e3e6b79"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href='{{ "css/style.css" | relURL }}'>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="PJ Kelly" />
  <link rel="manifest" href="/site.webmanifest" />
</head>

<body>
  <header>
    <a href='{{ "/" | relURL }}' class="site-title">{{ .Site.Title }}</a>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
</body>

</html>
